#version: "3.9"

services:
  maxiprod-api:
    build: ./API
    container_name: maxiprod-api
    restart: unless-stopped
    networks:
      - web
    volumes:
      - sqlite_data:/data
      - ./Database/init.sql:/app/init.sql:ro
    expose:
      - "5000"

  maxiprod-ui:
    build: ./UI
    container_name: maxiprod-ui
    restart: unless-stopped
    networks:
      - web
    depends_on:
      - maxiprod-api
    labels:
      - "traefik.enable=true"

      # Router HTTP → redirect to HTTPS
      - "traefik.http.routers.maxiprod-http.rule=Host(`maxiprod.viniciusguedes.cloud`)"
      - "traefik.http.routers.maxiprod-http.entrypoints=web"
      - "traefik.http.routers.maxiprod-http.middlewares=maxiprod-redirect"
      - "traefik.http.middlewares.maxiprod-redirect.redirectscheme.scheme=https"

      # Router HTTPS
      - "traefik.http.routers.maxiprod.rule=Host(`maxiprod.viniciusguedes.cloud`)"
      - "traefik.http.routers.maxiprod.entrypoints=websecure"
      - "traefik.http.routers.maxiprod.tls.certresolver=letsencrypt"

      # Service
      - "traefik.http.services.maxiprod.loadbalancer.server.port=80"

networks:
  web:
    external: true

volumes:
  sqlite_data:
